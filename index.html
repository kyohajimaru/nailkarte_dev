<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NalKar | ネイリストのための顧客カルテアプリ</title>
  <meta
    name="description"
    content="NalKarは、個人サロンのネイリストに向けたシンプルで上品な顧客カルテアプリです。"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="first-view" aria-label="NalKar ファーストビュー">
    <section class="hero">
      <div class="hero-logo-area">
        <img
          class="brand-logo"
          src="assets/images/Logo.png"
          alt="NalKar"
          width="720"
          height="320"
        >
      </div>

      <div class="hero-mockup-area" aria-label="アプリ画面イメージ">
        <div class="mockup-oval" aria-hidden="true"></div>
        <div class="iphone-mockup">
          <div class="phone-speaker" aria-hidden="true"></div>
          <div class="app-screen">
            <header class="app-header">
              <div>
                <p class="app-label">Customer chart</p>
                <h1>佐藤 美咲</h1>
              </div>
              <span class="app-date">Jun 30</span>
            </header>

            <section class="profile-card">
              <div class="avatar" aria-hidden="true">M</div>
              <div>
                <p>顧客名</p>
                <strong>佐藤 美咲</strong>
              </div>
            </section>

            <section class="content-block">
              <div class="block-heading">
                <h2>施術履歴</h2>
                <span>3件</span>
              </div>
              <div class="history-item">
                <span class="dot"></span>
                <div>
                  <strong>ワンカラー + ケア</strong>
                  <p>くすみピンク / short oval</p>
                </div>
              </div>
              <div class="history-item muted">
                <span class="dot"></span>
                <div>
                  <strong>マグネットネイル</strong>
                  <p>前回デザイン</p>
                </div>
              </div>
            </section>

            <section class="content-block note-block">
              <h2>メモ</h2>
              <p>甘皮まわり乾燥しやすい。上品なピンク系が好み。</p>
            </section>

            <section class="photo-row" aria-label="写真サムネイル">
              <div></div>
              <div></div>
              <div></div>
            </section>

            <section class="next-visit">
              <p>次回来店予定</p>
              <strong>7月21日 10:30</strong>
            </section>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
