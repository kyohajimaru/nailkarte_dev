<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NalKar | ネイリストのための顧客カルテアプリ</title>
  <meta
    name="description"
    content="NalKarは、個人サロンのネイリストに向けたシンプルで上品な顧客カルテアプリです。"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap"

  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="first-view" aria-label="NalKar ファーストビュー">
    <section class="hero">
      <div class="hero-logo-area">
        <img
          class="brand-logo"
          src="assets/images/Logo.png"
          alt="NalKar"
          width="720"
          height="320"
        >
      </div>

      <div class="hero-mockup-area" aria-label="NalKar ロゴイメージ">
        <img
          class="hero-feature-logo"
          src="assets/images/Logo.png"
          alt="NalKar"
          width="1537"
          height="1023"
        >
      </div>
    </section>
  </main>
  <script src="script.js"></script>

</html>
