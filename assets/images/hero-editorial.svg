  <text x="165" y="170" fill="#2F2A28" font-family="birra-pils, -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="500" letter-spacing="0.08em">NELKAR</text>
  <text x="165" y="220" fill="#5F5552" font-family="Noto Sans JP, sans-serif" font-size="24" font-weight="400">ネイリストのための、</text>
  <text x="165" y="255" fill="#5F5552" font-family="Noto Sans JP, sans-serif" font-size="24" font-weight="400">やさしく使えるカルテ</text>
  <text x="165" y="290" fill="#5F5552" font-family="Noto Sans JP, sans-serif" font-size="24" font-weight="400">アプリ。</text>
  <text x="135" y="476" fill="#2F2A28" font-family="Noto Sans JP, sans-serif" font-size="26" font-weight="500">顧客情報</text>
  <text x="135" y="518" fill="#5F5552" font-family="Noto Sans JP, sans-serif" font-size="20" font-weight="400">名前、住所、誕生日、アレルギー、自由メモ。</text>
  <text x="135" y="712" fill="#2F2A28" font-family="Noto Sans JP, sans-serif" font-size="26" font-weight="500">施術履歴と写真</text>
  <text x="135" y="754" fill="#5F5552" font-family="Noto Sans JP, sans-serif" font-size="20" font-weight="400">メニュー、金額、施術メモ、写真を残せます。</text>
  <text x="698" y="154" fill="#2F2A28" font-family="Noto Sans JP, sans-serif" font-size="22" font-weight="400">やさしいカラーで、すっきり管理。</text>
  <text x="698" y="334" fill="#2F2A28" font-family="Noto Sans JP, sans-serif" font-size="24" font-weight="400">写真も履歴も、</text>
  <text x="698" y="370" fill="#2F2A28" font-family="Noto Sans JP, sans-serif" font-size="24" font-weight="400">シンプルに見返せる。</text>
  <text x="698" y="542" fill="#2F2A28" font-family="Noto Sans JP, sans-serif" font-size="26" font-weight="400">一人サロンにちょうどいい軽さ。</text>
